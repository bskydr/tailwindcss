<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In - DreamStay</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gradient-to-br from-blue-100 to-teal-100 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md mx-auto bg-white/90 rounded-2xl shadow-2xl p-8 border border-gray-100">
      <div class="flex flex-col items-center mb-6">
        <svg class="w-12 h-12 text-teal-500 mb-2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10l9-7 9 7v7a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2a2 2 0 00-2-2h-2a2 2 0 00-2 2v2a2 2 0 01-2 2H5a2 2 0 01-2-2v-7z"/></svg>
        <h1 class="text-3xl font-extrabold text-teal-700 tracking-tight">Sign In to DreamStay</h1>
      </div>
      <form class="space-y-6">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700">Email address</label>
          <input id="email" name="email" type="email" autocomplete="email" required class="mt-1 block w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-teal-300" />
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required class="mt-1 block w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-teal-300" />
        </div>
        <div class="flex items-center justify-between">
          <div class="flex items-center">
            <input id="remember" name="remember" type="checkbox" class="h-4 w-4 text-teal-600 focus:ring-teal-500 border-gray-300 rounded" />
            <label for="remember" class="ml-2 block text-sm text-gray-900">Remember me</label>
          </div>
          <div class="text-sm">
            <a href="#" class="font-medium text-teal-600 hover:text-teal-500">Forgot your password?</a>
          </div>
        </div>
        <button type="submit" class="w-full py-3 px-4 rounded-lg bg-teal-500 text-white font-bold shadow hover:bg-teal-600 transition">Sign In</button>
      </form>
      <p class="mt-6 text-center text-sm text-gray-600">Don't have an account? <a href="#" class="text-teal-600 font-medium hover:underline">Sign up</a></p>
    </div>
  </body>
</html>
